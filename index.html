<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Tracker — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="icon-circle">🎴</div>
      <h1>Anime Tracker</h1>
      <p>Track. Manage. Enjoy.</p>
    </div>

    <div id="formError" class="form-error"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18v12H3z"/><path d="M3 6l9 7 9-7"/></svg>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="username" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field-row">
        <label class="checkbox-wrap">
          <input type="checkbox" id="rememberMe" checked />
          Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
    </form>

    <p class="login-footnote">Private anime tracker for up to 5 users.</p>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
